<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f0f1a; color: #e0e0e0;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 12px 16px; border-bottom: 1px solid #2a2a4a;
  }
  header h2 { font-size: 15px; color: #3b82f6; }
  header p { font-size: 11px; color: #666; margin-top: 2px; }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 16px;
  }
  .msg {
    margin: 8px 0; padding: 10px 12px; border-radius: 12px;
    font-size: 13px; line-height: 1.5; max-width: 90%;
    word-wrap: break-word;
  }
  .msg.user {
    background: #1e3a5f; margin-left: auto; border-bottom-right-radius: 4px;
  }
  .msg.ai {
    background: #1a1a2e; border: 1px solid #2a2a4a; border-bottom-left-radius: 4px;
  }
  .msg.tool {
    background: #1a2e1a; border: 1px solid #2a4a2a; font-size: 11px; color: #8b8;
    padding: 6px 10px; margin: 4px 0;
  }
  .typing { color: #666; font-style: italic; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .typing { animation: pulse 1.5s infinite; }
  #examples { padding: 8px 16px; }
  #examples p { font-size: 11px; color: #666; margin-bottom: 8px; }
  .example-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    padding: 6px 12px; border-radius: 16px;
    background: #1a1a2e; border: 1px solid #2a2a4a;
    font-size: 12px; color: #a0a0c0; cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { background: #1e3a5f; border-color: #3b82f6; color: #e0e0e0; }
  footer {
    padding: 12px 16px; border-top: 1px solid #2a2a4a;
    display: flex; gap: 8px;
  }
  input {
    flex: 1; padding: 10px 12px; border-radius: 8px;
    border: 1px solid #2a2a4a; background: #1a1a2e; color: #e0e0e0;
    font-size: 13px; outline: none;
  }
  input:focus { border-color: #3b82f6; }
  input:disabled { opacity: 0.5; }
  button {
    padding: 10px 16px; border: none; border-radius: 8px;
    background: #3b82f6; color: white; font-weight: 600;
    cursor: pointer; font-size: 13px;
    transition: background 0.15s;
  }
  button:hover { background: #2563eb; }
  button:disabled { background: #333; cursor: not-allowed; }
  .powered { text-align: center; padding: 6px; font-size: 10px; color: #444; }
  .powered a { color: #3b82f6; text-decoration: none; }
</style>
</head>
<body>
  <header>
    <h2>💬 Browsing Assistant</h2>
    <p>I can read, click, scroll, and navigate this page for you</p>
  </header>
  <div id="messages"></div>
  <div id="examples">
    <p>Try asking:</p>
    <div class="example-chips">
      <span class="chip" onclick="askExample(this)">What's trending on this page?</span>
      <span class="chip" onclick="askExample(this)">Summarize the top 5 stories</span>
      <span class="chip" onclick="askExample(this)">Open the #1 story</span>
      <span class="chip" onclick="askExample(this)">Find any AI-related posts</span>
      <span class="chip" onclick="askExample(this)">What has the most points?</span>
    </div>
  </div>
  <footer>
    <input id="input" placeholder="Ask anything about this page…" autofocus>
    <button id="send" onclick="sendMessage()">Send</button>
  </footer>
  <div class="powered">Powered by <a href="https://webfuse.com" target="_blank">Webfuse</a> + <a href="https://sdk.vercel.ai" target="_blank">Vercel AI SDK</a></div>
  <script src="sidepanel.js"></script>
</body>
</html>
