<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Verdana, Geneva, sans-serif;
    background: #f6f6ef; color: #828282;
    display: flex; flex-direction: column; height: 100vh;
    font-size: 10pt;
  }
  header {
    background: #ff6600; padding: 4px 8px;
    display: flex; align-items: center; gap: 8px;
  }
  header h2 {
    font-size: 13px; font-weight: bold; color: #000;
    letter-spacing: -0.5px;
  }
  header p { font-size: 9px; color: #000; opacity: 0.7; }
  #messages {
    flex: 1; overflow-y: auto; padding: 8px;
    scroll-behavior: smooth;
  }
  .msg {
    margin: 6px 0; padding: 6px 8px; font-size: 9pt;
    line-height: 1.5; word-wrap: break-word;
  }
  .msg.user {
    background: #ffeedd; border-left: 3px solid #ff6600;
    margin-left: 20px;
  }
  .msg.ai {
    background: #fff; border: 1px solid #e0d8d0;
    color: #000;
  }
  .msg.tool {
    background: transparent; font-size: 8pt; color: #828282;
    padding: 2px 8px; margin: 2px 0;
    font-style: italic;
  }
  #examples { padding: 6px 8px; border-top: 1px solid #e0d8d0; }
  #examples p { font-size: 8pt; color: #828282; margin-bottom: 4px; font-style: italic; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    padding: 3px 8px; border-radius: 3px;
    background: #fff; border: 1px solid #e0d8d0;
    font-size: 8pt; color: #828282; cursor: pointer;
    font-family: Verdana, Geneva, sans-serif;
    transition: all 0.1s;
  }
  .chip:hover { background: #ffeedd; border-color: #ff6600; color: #000; }
  .chip.featured { background: #ffeedd; border-color: #ff6600; color: #000; font-weight: bold; }
  footer {
    padding: 6px 8px; border-top: 2px solid #ff6600;
    display: flex; gap: 6px; background: #f6f6ef;
  }
  input {
    flex: 1; padding: 6px 8px; border-radius: 3px;
    border: 1px solid #e0d8d0; background: #fff; color: #000;
    font-size: 9pt; outline: none;
    font-family: Verdana, Geneva, sans-serif;
  }
  input:focus { border-color: #ff6600; }
  input:disabled { opacity: 0.5; }
  button {
    padding: 4px 12px; border: none; border-radius: 3px;
    background: #ff6600; color: white; font-weight: bold;
    cursor: pointer; font-size: 9pt;
    font-family: Verdana, Geneva, sans-serif;
  }
  button:hover { background: #e55b00; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .bottom-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 8px; border-top: 1px solid #e0d8d0;
    font-size: 8pt; color: #828282;
  }
  .bottom-bar a { color: #ff6600; text-decoration: none; }
  .bottom-bar a:hover { text-decoration: underline; }
  .clone-btn {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 3px;
    border: 1px solid #e0d8d0; background: #fff;
    font-size: 8pt; color: #828282; cursor: pointer;
    font-family: Verdana, Geneva, sans-serif;
    text-decoration: none;
    transition: all 0.1s;
  }
  .clone-btn:hover { border-color: #ff6600; color: #000; background: #ffeedd; text-decoration: none; }
  .clone-btn svg { width: 12px; height: 12px; }
</style>
</head>
<body>
  <header>
    <div>
      <h2>Hacker News Copilot</h2>
      <p>your AI sidekick for the orange site</p>
    </div>
  </header>
  <div id="messages"></div>
  <div id="examples">
    <p>try one:</p>
    <div class="chips">
      <span class="chip featured" onclick="askExample(this)">😂 Write a funny comment on #1</span>
      <span class="chip" onclick="askExample(this)">💬 Comments on #1</span>
      <span class="chip" onclick="askExample(this)">👀 Open story #3</span>
      <span class="chip" onclick="askExample(this)">🔥 What's trending?</span>
      <span class="chip" onclick="askExample(this)">📋 Top 5 stories</span>
      <span class="chip" onclick="askExample(this)">🏆 Most upvoted?</span>
      <span class="chip" onclick="askExample(this)">🤖 Any AI posts?</span>
    </div>
  </div>
  <footer>
    <input id="input" placeholder="ask me anything about HN…" autofocus>
    <button id="send" onclick="sendMessage()">go</button>
  </footer>
  <div class="bottom-bar">
    <span>powered by <a data-href="https://webfuse.com" onclick="window.open(this.dataset.href,'_blank')">webfuse</a> + <a data-href="https://sdk.vercel.ai" onclick="window.open(this.dataset.href,'_blank')">vercel ai sdk</a></span>
    <a class="clone-btn" data-href="https://github.com/hummer-netizen/extension-vercel-ai-mcp" onclick="window.open(this.dataset.href,'_blank')">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      clone it
    </a>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
