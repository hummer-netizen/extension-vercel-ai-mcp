<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Verdana, Geneva, sans-serif;
    background: #f6f6ef; color: #828282;
    display: flex; flex-direction: column; height: 100vh;
    font-size: 10pt;
  }
  header {
    background: #ff6600; padding: 4px 8px;
    display: flex; align-items: center; gap: 8px;
  }
  header h2 {
    font-size: 13px; font-weight: bold; color: #000;
    letter-spacing: -0.5px;
  }
  header p { font-size: 9px; color: #000; opacity: 0.7; }
  #messages {
    flex: 1; overflow-y: auto; padding: 8px;
    scroll-behavior: smooth;
  }
  .msg {
    margin: 6px 0; padding: 6px 8px; font-size: 9pt;
    line-height: 1.5; word-wrap: break-word;
  }
  .msg.user {
    background: #ffeedd; border-left: 3px solid #ff6600;
    margin-left: 20px;
  }
  .msg.ai {
    background: #fff; border: 1px solid #e0d8d0;
    color: #000;
  }
  .msg.tool {
    background: transparent; font-size: 8pt; color: #828282;
    padding: 2px 8px; margin: 2px 0;
    font-style: italic;
  }
  #examples { padding: 6px 8px; border-top: 1px solid #e0d8d0; }
  #examples p { font-size: 8pt; color: #828282; margin-bottom: 4px; font-style: italic; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip {
    padding: 3px 8px; border-radius: 3px;
    background: #fff; border: 1px solid #e0d8d0;
    font-size: 8pt; color: #828282; cursor: pointer;
    font-family: Verdana, Geneva, sans-serif;
    transition: all 0.1s;
  }
  .chip:hover { background: #ffeedd; border-color: #ff6600; color: #000; }
  .chip.featured { background: #ffeedd; border-color: #ff6600; color: #000; font-weight: bold; }
  footer {
    padding: 6px 8px; border-top: 2px solid #ff6600;
    display: flex; gap: 6px; background: #f6f6ef;
  }
  input {
    flex: 1; padding: 6px 8px; border-radius: 3px;
    border: 1px solid #e0d8d0; background: #fff; color: #000;
    font-size: 9pt; outline: none;
    font-family: Verdana, Geneva, sans-serif;
  }
  input:focus { border-color: #ff6600; }
  input:disabled { opacity: 0.5; }
  button {
    padding: 4px 12px; border: none; border-radius: 3px;
    background: #ff6600; color: white; font-weight: bold;
    cursor: pointer; font-size: 9pt;
    font-family: Verdana, Geneva, sans-serif;
  }
  button:hover { background: #e55b00; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .powered {
    text-align: center; padding: 4px; font-size: 8pt; color: #828282;
    border-top: 1px solid #e0d8d0;
  }
  .powered a { color: #ff6600; text-decoration: none; }
</style>
</head>
<body>
  <header>
    <div>
      <h2>Hacker News Copilot</h2>
      <p>your AI sidekick for the orange site</p>
    </div>
  </header>
  <div id="messages"></div>
  <div id="examples">
    <p>try one:</p>
    <div class="chips">
      <span class="chip featured" onclick="askExample(this)">😂 Write a funny comment on #1</span>
      <span class="chip" onclick="askExample(this)">💬 Comments on #1</span>
      <span class="chip" onclick="askExample(this)">👀 Open story #3</span>
      <span class="chip" onclick="askExample(this)">🔥 What's trending?</span>
      <span class="chip" onclick="askExample(this)">📋 Top 5 stories</span>
      <span class="chip" onclick="askExample(this)">🏆 Most upvoted?</span>
      <span class="chip" onclick="askExample(this)">🤖 Any AI posts?</span>
    </div>
  </div>
  <footer>
    <input id="input" placeholder="ask me anything about HN…" autofocus>
    <button id="send" onclick="sendMessage()">go</button>
  </footer>
  <div class="powered">powered by <a href="https://webfuse.com" target="_blank">webfuse</a> + <a href="https://sdk.vercel.ai" target="_blank">vercel ai sdk</a></div>
  <script src="sidepanel.js"></script>
</body>
</html>
